version: "3"
services:
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - /usr/src/app/node_modules
      - ./client:/usr/src/app
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DB_URL=mongodb://mongodb:27017/readingguide
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
    depends_on:
      - mongodb
    volumes:
      - /usr/src/app/node_modules
      - ./server:/usr/src/app
  mongodb:
    image: mongo:latest
    ports:
    - "27017:27017"
    volumes:
    - mongodb_data:/data/db
volumes:
  mongodb_data:
